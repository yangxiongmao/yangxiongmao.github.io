<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>北大熊猫老师 · 2026年北京中考一模喜报</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <div class="page-wrapper">
    <!-- 顶部横幅 -->
    <header class="hero">
      <div class="hero-bg"></div>
      <div class="hero-content">
        <div class="badge"><i class="fas fa-award"></i> 北大熊猫老师</div>
        <h1>2026年北京市中考一模 · 光荣喜报</h1>
        <p class="subtitle">数学 · 物理 一模成绩光荣榜</p>
        <div class="stats-overview" id="statsOverview"></div>
      </div>
    </header>

    <!-- 筛选栏 -->
    <section class="filter-bar">
      <div class="filter-group">
        <label for="filterDistrict"><i class="fas fa-map-marker-alt"></i> 区域</label>
        <select id="filterDistrict">
          <option value="all">全部区域</option>
          <option value="海淀区">海淀区</option>
          <option value="西城区">西城区</option>
          <option value="东城区">东城区</option>
          <option value="朝阳区">朝阳区</option>
          <option value="丰台区">丰台区</option>
        </select>
      </div>
      <div class="filter-group">
        <label for="filterSubject"><i class="fas fa-book"></i> 学科</label>
        <select id="filterSubject">
          <option value="all">全部学科</option>
          <option value="math">数学</option>
          <option value="physics">物理</option>
        </select>
      </div>
      <div class="filter-group">
        <label for="filterSchool"><i class="fas fa-school"></i> 学校</label>
        <select id="filterSchool">
          <option value="all">全部学校</option>
        </select>
      </div>
      <div class="filter-group">
        <label for="filterScore"><i class="fas fa-chart-bar"></i> 分数段</label>
        <select id="filterScore">
          <option value="all">全部分数</option>
          <option value="95">95分以上</option>
          <option value="90">90分以上</option>
          <option value="85">85分以上</option>
        </select>
      </div>
      <button class="btn-reset" id="btnReset"><i class="fas fa-redo"></i> 重置</button>
    </section>

    <!-- 成绩表格 -->
    <section class="table-section">
      <div class="table-header">
        <h2><i class="fas fa-trophy"></i> 光荣榜单</h2>
        <div class="table-header-right">
          <span class="count-badge" id="countBadge">共 0 人</span>
          <button class="btn-manage" id="btnManage"><i class="fas fa-cog"></i> 管理数据</button>
        </div>
      </div>
      <div class="table-wrapper">
        <table id="scoreTable">
          <thead>
            <tr>
              <th class="th-rank">排名</th>
              <th class="th-name">姓名</th>
              <th class="th-district">区域</th>
              <th class="th-school">学校</th>
              <th class="th-grade">年级</th>
              <th class="th-score sortable" data-sort="math">
                数学 <i class="fas fa-sort"></i>
              </th>
              <th class="th-score sortable" data-sort="physics">
                物理 <i class="fas fa-sort"></i>
              </th>
              <th class="th-total sortable" data-sort="total">
                总分 <i class="fas fa-sort"></i>
              </th>
            </tr>
          </thead>
          <tbody id="scoreBody"></tbody>
        </table>
      </div>
      <div class="empty-state" id="emptyState" style="display:none;">
        <i class="fas fa-search"></i>
        <p>没有找到匹配的学员记录</p>
      </div>
    </section>

    <!-- 数据分析面板 -->
    <section class="analytics-section">
      <h2><i class="fas fa-chart-line"></i> 成绩分析</h2>
      <div class="analytics-grid" id="analyticsGrid"></div>
    </section>

    <footer>
      <p>北大熊猫老师 · 2026年一模喜报 · 数据仅供参考</p>
    </footer>
  </div>

  <!-- 数据管理弹窗 -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h3><i class="fas fa-database"></i> 数据管理</h3>
        <button class="modal-close" id="modalClose"><i class="fas fa-times"></i></button>
      </div>
      <div class="modal-body">
        <!-- 工具栏 -->
        <div class="manage-toolbar">
          <button class="btn-action btn-add" id="btnAdd"><i class="fas fa-plus"></i> 新增学员</button>
          <button class="btn-action btn-export" id="btnExport"><i class="fas fa-download"></i> 导出 JSON</button>
          <label class="btn-action btn-import">
            <i class="fas fa-upload"></i> 导入 JSON
            <input type="file" id="fileImport" accept=".json" hidden>
          </label>
          <button class="btn-action btn-restore" id="btnRestore"><i class="fas fa-undo"></i> 恢复默认</button>
        </div>

        <!-- 新增/编辑表单 -->
        <div class="form-panel" id="formPanel" style="display:none;">
          <h4 id="formTitle">新增学员</h4>
          <form id="studentForm">
            <input type="hidden" id="editId" value="">
            <div class="form-row">
              <div class="form-field">
                <label>姓名 *</label>
                <input type="text" id="fName" required placeholder="如：张*轩">
              </div>
              <div class="form-field">
                <label>区域 *</label>
                <select id="fDistrict" required>
                  <option value="海淀区">海淀区</option>
                  <option value="西城区">西城区</option>
                  <option value="东城区">东城区</option>
                  <option value="朝阳区">朝阳区</option>
                  <option value="丰台区">丰台区</option>
                </select>
              </div>
            </div>
            <div class="form-row">
              <div class="form-field">
                <label>学校 *</label>
                <input type="text" id="fSchool" required placeholder="如：人大附中">
              </div>
              <div class="form-field">
                <label>年级</label>
                <input type="text" id="fGrade" value="初三" placeholder="初三">
              </div>
            </div>
            <div class="form-row">
              <div class="form-field">
                <label>数学成绩 (0-100) *</label>
                <input type="number" id="fMath" required min="0" max="100" placeholder="0-100">
              </div>
              <div class="form-field">
                <label>物理成绩 (0-80) *</label>
                <input type="number" id="fPhysics" required min="0" max="80" placeholder="0-80">
              </div>
            </div>
            <div class="form-buttons">
              <button type="submit" class="btn-save"><i class="fas fa-check"></i> 保存</button>
              <button type="button" class="btn-cancel" id="btnCancelForm"><i class="fas fa-times"></i> 取消</button>
            </div>
          </form>
        </div>

        <!-- 数据列表 -->
        <div class="manage-table-wrapper">
          <table class="manage-table">
            <thead>
              <tr>
                <th>姓名</th>
                <th>区域</th>
                <th>学校</th>
                <th>数学</th>
                <th>物理</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="manageBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast 提示 -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
